<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Keystrokes Blocker</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="header">
      <div class="title-row">
        <svg
          class="logo"
          viewBox="0 0 24 24"
          width="22"
          height="22"
          fill="currentColor"
        >
          <path
            d="M20,5H4C2.9,5,2,5.9,2,7v10c0,1.1,0.9,2,2,2h16c1.1,0,2-0.9,2-2V7C22,5.9,21.1,5,20,5z M11,8h2v2h-2V8z M11,11h2v2h-2V11z M8,8h2v2H8V8z M8,11h2v2H8V11z M7,13H5v-2h2V13z M7,10H5V8h2V10z M16,17H8v-2h8V17z M16,13h-2v-2h2V13z M16,10h-2V8h2V10z M19,13h-2v-2h2V13z M19,10h-2V8h2V10z"
          />
        </svg>
        <span class="title">Hotkey Settings</span>
        <span class="version" id="version"></span>
      </div>
      <a class="options-link" id="open-options" title="Open full settings page"
        >⚙</a
      >
    </div>

    <div class="section-label">Basic Controls</div>
    <div class="rows" id="base-rows"></div>

    <button class="advanced-toggle" id="advanced-toggle">
      Show more controls ▾
    </button>
    <div class="rows advanced-rows" id="advanced-rows"></div>

    <div class="footer">
      <button class="btn btn-reset" id="reset-btn">Reset</button>
      <div class="footer-right">
        <button class="btn btn-save" id="save-btn">Save</button>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
